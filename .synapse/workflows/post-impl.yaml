name: post-impl
description: >
  Post-implementation workflow using target: self. Runs docs/simplify/sync in parallel,
  then release, commit all changes, create PR, and autofix with pr-guardian — all
  injected back into the current agent's own PTY. Mirrors post-impl-codex but stays
  in-process instead of spawning a separate agent.
auto_spawn: true
steps:
  - target: self
    message: >
      以下の4つのタスクを並列で実行してください:
      1. synapse-docs: README.md, guides/, CLAUDE.md のドキュメント更新
      2. /code-simplifier: 最近変更された .py ファイルのコード整理
      3. sync-plugin-skills: plugins/synapse-a2a/skills/ のスキル同期
      4. github-pages-sync: site-docs/ と mkdocs.yml の同期
      コンフリクトがあれば sync-plugin-skills が SKILL.md で優先、synapse-docs が README.md で優先、github-pages-sync が mkdocs.yml で優先です。
    priority: 3
    response_mode: wait
    timeout: 600
  - target: self
    message: "/release"
    priority: 3
    response_mode: wait
    timeout: 300
  - target: self
    message: "変更をコミットしてください。実装内容に応じて分割コミットでも単一コミットでも構いません。Conventional Commits形式でお願いします。"
    priority: 3
    response_mode: wait
    timeout: 300
  - target: self
    message: "PRを作成してください。ベースブランチはmainです。タイトルと本文は実装内容から自動生成してください。"
    priority: 3
    response_mode: wait
    timeout: 300
  - target: self
    message: "/pr-guardian"
    priority: 3
    response_mode: wait
    timeout: 3600
