# GitHub Copilot CLI profile
# Uses interactive TUI mode similar to Claude Code
command: "copilot"
args: []
# Enter (\r) submits the prompt in Copilot CLI.
submit_sequence: "\r"
# PTY write delay between data and submit_seq (seconds)
# Copilot's Ink TUI processes input character-by-character through useInput.
# Allow time for React to render before Enter is sent.
write_delay: 0.5
submit_confirm_timeout: 1.5
submit_confirm_poll_interval: 0.05
submit_confirm_retries: 3
# Long multiline / file-reference sends can take longer to clear the Copilot
# prompt after bracketed paste, so use a slightly larger confirmation budget.
long_submit_confirm_timeout: 3.0
long_submit_confirm_retries: 5
# Bracketed paste disabled: Copilot CLI does not enable bracketed paste mode
# (ESC[?2004h), so ESC[200~/ESC[201~ markers are ignored and text is processed
# character-by-character through useInput.  With bracketed paste off, messages
# containing '/' can trigger slash-command completion.  Callers must ensure
# that '/' never appears at line-start in the message body.
bracketed_paste: false
env:
  TERM: "xterm-256color"

# Multi-strategy idle detection configuration
# Copilot CLI: Timeout-based detection (similar to Claude Code)
# The TUI doesn't have consistent prompt patterns, so we use timeout
idle_detection:
  strategy: "timeout"
  pattern_use: "never"         # No pattern detection for Copilot CLI
  timeout: 0.5                 # 500ms no output = idle

# Input ready detection for initial instructions
# Wait for this pattern before sending instructions to ensure TUI is ready
input_ready_pattern: "❯"                       # Copilot shows ❯ when ready for input

# WAITING status detection (user input prompts)
# Copilot CLI uses selection UI for tool approvals and confirmations
# Detects numbered choices, Yes/No prompts, and selection indicators
waiting_detection:
  # Regex pattern to detect:
  # - Numbered choices (1., 2., 3.)
  # - Selection indicators (>, *)
  # - Yes/No prompts [y/N] or (y/n)
  regex: "^\\s*\\d+\\.\\s+.+$|^\\s*[>\\*]\\s+.+$|\\[[yYnN]/[yYnN]\\]|\\([yYnN]/[yYnN]\\)"
  require_idle: true
  idle_timeout: 0.5            # 500ms no output after pattern
  waiting_expiry: 10           # Auto-clear WAITING after 10s
