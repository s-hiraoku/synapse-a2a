# GitHub Copilot CLI profile
# Uses interactive TUI mode similar to Claude Code
command: "copilot"
args: []
# Enter (\r) submits the prompt in Copilot CLI.
submit_sequence: "\r"
# PTY write delay between data and submit_seq (seconds)
# Copilot's Ink TUI processes input character-by-character through useInput.
# Allow time for React to render before Enter is sent.
write_delay: 0.5
submit_confirm_timeout: 1.5
submit_confirm_poll_interval: 0.05
submit_confirm_retries: 3
# Long multiline / file-reference sends can take longer to clear the Copilot
# prompt after bracketed paste, so use a slightly larger confirmation budget.
long_submit_confirm_timeout: 3.0
long_submit_confirm_retries: 5
# Bracketed paste enabled: Copilot CLI 1.0.12+ enables bracketed paste mode
# (ESC[?2004h) on startup.  Synapse must wrap injected text in
# ESC[200~/ESC[201~ markers so Ink routes it through usePaste as a single
# event.  Without markers, text is processed character-by-character through
# useInput, causing slash-command autocomplete and submit failures.
bracketed_paste: true
env:
  TERM: "xterm-256color"

interrupt:
  default_mode: pty
  pty_repeat: 2
  graceful_supported: false

# Multi-strategy idle detection configuration
# Copilot CLI: Timeout-based detection (similar to Claude Code)
# The TUI doesn't have consistent prompt patterns, so we use timeout
idle_detection:
  strategy: "timeout"
  pattern_use: "never"         # No pattern detection for Copilot CLI
  timeout: 0.5                 # 500ms no output = idle

# Input ready detection for initial instructions
# Wait for this pattern before sending instructions to ensure TUI is ready
input_ready_pattern: "❯"                       # Copilot shows ❯ when ready for input

# WAITING status detection (user input prompts)
# Copilot CLI uses Ink TUI with numbered selection for tool approvals
# UI: 1. Yes / 2. Yes, and approve TOOL for the rest of the running session
#      3. No, and tell Copilot what to do differently (Esc)
#
# Regex anchors numbered choices on Copilot-specific verbs (Yes/No/Allow/Deny/
# Approve/Skip) instead of any "N. text" line. This prevents bracketed-paste
# echoes of user-pasted markdown (numbered lists, > quotes, * bullets) from
# falsely flipping status to WAITING during the submit-confirmation window,
# which previously caused `synapse send` to "deliver" text without submitting
# the prompt.
# heuristic_fallback is disabled because the generic ❯/›/● selectors trigger
# on Copilot's own ❯ input prompt and on routine status redraws.
waiting_detection:
  regex: "^\\s*\\d+\\.\\s+(Yes|No|Allow|Deny|Approve|Skip)\\b|\\[[yYnN]/[yYnN]\\]|\\([yYnN]/[yYnN]\\)|approve .+ for the rest of the running session|No, and tell Copilot"
  heuristic_fallback: false
  require_idle: true
  idle_timeout: 0.5            # 500ms no output after pattern
  waiting_expiry: 10           # Auto-clear WAITING after 10s

# Auto-approve configuration
# --allow-all is the canonical form; Copilot also accepts --yolo as an alias.
auto_approve:
  cli_flag: "--allow-all"
  # Copilot accepts --yolo as an alias for --allow-all.
  alternative_flags:
    - "--yolo"
  runtime_response: "1\r"
  deny_response: "\x1b"
