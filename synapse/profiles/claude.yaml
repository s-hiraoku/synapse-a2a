# Claude Code CLI profile
# Uses Ink-based TUI which requires CR for input submission (Claude Code v2.0.76)
command: "claude"
args: []
# CR required for Claude Code's Ink TUI to process Enter key
submit_sequence: "\r"
env:
  TERM: "xterm-256color"

interrupt:
  default_mode: pty
  pty_repeat: 1
  graceful_supported: true

# Multi-strategy idle detection configuration
# Claude Code: Hybrid pattern + timeout detection
# - Pattern: BRACKETED_PASTE_MODE (ESC[?2004h) indicates idle at startup
# - Timeout: 0.5s fallback for subsequent idles (pattern may not reappear)
# This hybrid approach gives fast startup detection + reliable ongoing detection
idle_detection:
  strategy: "hybrid"                           # Pattern first, then timeout
  pattern: "BRACKETED_PASTE_MODE"              # ESC[?2004h = ready for input
  pattern_use: "startup_only"                  # Only check pattern at startup
  timeout: 0.5                                 # 500ms no output = idle (fallback)
  task_protection_timeout: 15                  # Compound signal: suppress READY during A2A task

# Input ready detection for initial instructions
# Disabled: ❯ pattern may not reliably appear in all Claude Code versions
# Rely on timeout-based idle detection (0.5s) instead
# input_ready_pattern: "❯"

# WAITING status detection (user input prompts)
# Re-enabled with #140 fix: now uses new_data only + auto-expiry
waiting_detection:
  regex: "^❯\\s+.+|^[☐☑]\\s+|\\[[Yy]/[Nn]\\]"
  heuristic_fallback: true
  require_idle: true
  idle_timeout: 0.3
  waiting_expiry: 10                           # Auto-clear WAITING after 10s

# Auto-approve configuration (used by synapse spawn / team start)
# cli_flag: Injected as tool_arg to skip permission prompts at launch.
#   Anthropic's current recommendation is `--permission-mode auto` (formerly
#   "auto mode"), which uses a classifier to block risky actions while
#   allowing routine work. The legacy `--dangerously-skip-permissions`
#   (alias for `--permission-mode bypassPermissions`) disables all checks
#   and is explicitly discouraged for new code — see
#   https://code.claude.com/docs/en/permission-modes.md
#   We keep both legacy forms in alternative_flags so users who still pass
#   them manually do not get a duplicated flag injected.
#   Auto mode requires Max/Team/Enterprise/API plan and Sonnet 4.6 / Opus 4.6+.
# runtime_response: Sent to PTY when WAITING status detected during execution
auto_approve:
  cli_flag: "--permission-mode=auto"
  alternative_flags:
    - "--permission-mode=bypassPermissions"
    - "--permission-mode"
    - "--dangerously-skip-permissions"
  runtime_response: "y\r"
  deny_response: "n\r"
