command: "codex"
args: []
submit_sequence: "\r"
env:
  TERM: "xterm-256color"

interrupt:
  default_mode: signal
  pty_repeat: 2
  graceful_supported: false

# Multi-strategy idle detection configuration
# Codex uses hybrid detection: prompt match at startup, then timeout-based idle checks
# startup_only avoids false positives from prompt text appearing in conversation history
idle_detection:
  strategy: "hybrid"
  pattern: "›"
  pattern_use: "startup_only"
  timeout: 3.0               # 3.0 seconds of no output = idle
  task_protection_timeout: 30  # Compound signal: suppress READY during A2A task

# Input ready detection for initial instructions
# Wait for this pattern before sending instructions to ensure TUI is ready
input_ready_pattern: "›"                       # Codex shows › when ready for input

# WAITING status detection (user input prompts)
# Re-enabled with #140 fix: now uses new_data only + auto-expiry
# Codex uses ratatui TUI with › selector for approval overlays
# Source: codex-rs/tui/src/bottom_pane/approval_overlay.rs
# UI: › 1. Yes, proceed (y) / Yes, and don't ask again (a) / No, and tell Codex (esc)
# The regex also catches the "Approaching rate limits" model-switch modal
# and other numbered selectors that share the same › prefix, because
# codex keeps introducing new prompt variants and the numbered-selector
# shape is the most stable signal we have. See issue tracking the deeper
# waiting_detection / alternate-screen-buffer fix for the longer-term plan.
# Also matches permissions, host allow/block, patch, and continue-without overlays introduced in newer codex builds.
waiting_detection:
  regex: "›\\s+\\d+\\.|Yes, proceed|Yes, and don't ask again|No, and tell Codex|Press [Ee]nter to confirm|Would you like to|Approaching rate limits|Switch to gpt-|Keep current model|You've hit your usage limit|grant these permissions|continue without permissions|allow this host in the future|block this host in the future|continue without running it|don't ask again for these files|don't ask again for this command"
  heuristic_fallback: true
  require_idle: true
  idle_timeout: 0.5
  waiting_expiry: 30                           # Auto-clear WAITING after 30s to give the parent a realistic window to intervene

# Auto-approve configuration
# Codex CLI 0.128+ deprecated --full-auto and reorganized auto-approve around
# permission profiles selected via `default_permissions` in ~/.codex/config.toml.
# We inject `:workspace` (workspace-write equivalent of the old --full-auto)
# inline with `-c default_permissions=":workspace"` so the choice is per-spawn
# and does not rely on the user's global config.
# Built-in profiles available in 0.128+: ":read-only", ":workspace",
# ":danger-no-sandbox" (intentionally not used here — too dangerous for default).
# References: openai/codex PR #19900 (built-in profiles), PR #20133 (--full-auto deprecation).
auto_approve:
  cli_flag: '-cdefault_permissions=":workspace"'
  # Mutually-exclusive approval / sandbox flags Codex CLI also accepts.
  # If the user passes any of these, skip cli_flag injection to avoid
  # conflicts that cause the agent to fail to start.
  alternative_flags:
    - "--full-auto"  # legacy (rejected by 0.128+ but still skip-injection trigger)
    - "--dangerously-bypass-approvals-and-sandbox"
    - "--ask-for-approval"
    - "-a"
    - "--sandbox"
    - "-s"
    - "--profile"
    - "-p"
    - "default_permissions"  # any -c default_permissions=... form
  runtime_response: "y\r"
  deny_response: "\x1b"
