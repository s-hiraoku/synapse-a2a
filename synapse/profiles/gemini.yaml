command: "gemini"
args: []
submit_sequence: "\r"
startup_delay: 8
env:
  TERM: "xterm-256color"

# Multi-strategy idle detection configuration
# Gemini: Use hybrid strategy - pattern for first idle (UI ready), timeout for subsequent
# BRACKETED_PASTE_MODE indicates the TUI input area is ready to receive input
idle_detection:
  strategy: "hybrid"
  pattern: "BRACKETED_PASTE_MODE"  # ESC[?2004h = TUI input ready
  pattern_use: "startup_only"      # Only use pattern for first READY detection
  timeout: 3.0                     # 3.0 seconds of no output = idle (after first)

# Input ready detection for initial instructions
# Wait for this pattern before sending instructions to ensure TUI is ready
input_ready_pattern: ">"                       # Gemini shows > in input box when ready

# WAITING status detection (user input prompts)
# Re-enabled with #140 fix: now uses new_data only + auto-expiry
# Gemini uses Ink TUI with ● selector for permission dialogs
# Source: packages/cli/src/ui/components/messages/ToolConfirmationMessage.tsx
# UI: ● 1. Allow once / Allow for this session / No, suggest changes (esc)
# Header: "Action Required"
waiting_detection:
  regex: "●\\s+\\d+\\.|Action Required|Allow (?:once|for this session|for this file)|No, suggest changes"
  require_idle: true
  idle_timeout: 0.5
  waiting_expiry: 10                           # Auto-clear WAITING after 10s

# Auto-approve configuration
# Gemini --yolo enables Docker sandbox by default
auto_approve:
  cli_flag: "--yolo"
  runtime_response: "\r"
