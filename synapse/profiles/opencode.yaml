command: "opencode"
args: []
submit_sequence: "\r"
env:
  TERM: "xterm-256color"

interrupt:
  default_mode: pty
  pty_repeat: 2
  graceful_supported: false

# Multi-strategy idle detection configuration
# OpenCode: Use timeout-based detection
# OpenCode uses Bubble Tea TUI, similar to Claude Code
idle_detection:
  strategy: "timeout"
  pattern_use: "never"       # No pattern detection for OpenCode
  timeout: 1.0               # 1.0 second of no output = idle

# Input ready detection for initial instructions
# OpenCode uses full-screen Bubble Tea TUI with always-visible input area
# No specific pattern - TUI occupies entire terminal, ready when idle
# input_ready_pattern: not set (use timeout-based detection only)

# WAITING status detection (user input prompts)
# OpenCode uses Bubble Tea TUI with horizontal button bar for permission dialogs
# Source: internal/tui/components/dialog/permission.go
# UI: [Allow (a)]  [Allow for session (s)]  [Deny (d)]
# Dialog title: "Permission Required"
waiting_detection:
  regex: "Permission Required|Allow \\(a\\)|Allow for session \\(s\\)|Deny \\(d\\)"
  heuristic_fallback: true
  require_idle: true
  idle_timeout: 0.5          # 500ms no output after pattern
  waiting_expiry: 10         # Auto-clear WAITING after 10s

# Auto-approve configuration
# OpenCode has no CLI flag; uses env var OPENCODE_DANGEROUSLY_SKIP_PERMISSIONS
auto_approve:
  cli_flag: null
  env_flag: "OPENCODE_DANGEROUSLY_SKIP_PERMISSIONS=true"
  runtime_response: "a\r"
  deny_response: "d\r"
