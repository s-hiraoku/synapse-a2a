# agent-teams: distribute a list of inline tasks across a pool of workers.
#
# Use this when:
#   - You have a flat queue of independent work items
#   - You want N workers pulling from the queue concurrently
#   - Each item is self-contained (no cross-item dependencies)
#
# Run:
#   synapse map run batch-translate --task "Translate to Japanese" --dry-run
#   synapse map run batch-translate --task "Translate to Japanese"

name: batch-translate
pattern: agent-teams
description: Translate a batch of short texts across a worker pool

team:
  count: 3                # Number of parallel workers
  profile: claude
  name: Translator        # Workers will be named Translator-1, Translator-2, ...
  worktree: false         # Translation doesn't need isolated git worktrees

task_queue:
  # v1 only supports inline queues. A future version may add file/json sources.
  source: inline
  tasks:
    - "Welcome to the dashboard."
    - "Your session has expired. Please sign in again."
    - "Settings saved successfully."
    - "An unexpected error occurred. Please try again."
    - "Are you sure you want to delete this item?"

completion:
  # all-done    — wait until every queue item is processed
  # time-budget — stop after `timeout` seconds regardless of remaining items
  mode: all-done
  timeout: 1800   # seconds; only used when mode is time-budget, but also acts
                  # as an upper safety bound in all-done mode
